<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YaLiEs Petrol - Control de Carburantes</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <span class="logo-icon"><i class="bi bi-fuel-pump-fill"></i></span>
                    <div class="logo-text">
                        <h3>YaLiEs</h3>
                        <span>Petrol</span>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#" class="nav-link active" data-view="dashboard" id="nav-dashboard">
                            <i class="bi bi-speedometer2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-view="ventas-nueva" id="nav-ventas-nueva">
                            <i class="bi bi-cart-plus-fill text-accent"></i>
                            <span>Nueva Venta</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-view="ingresos" id="nav-ingresos">
                            <i class="bi bi-arrow-down-left-square"></i>
                            <span>Registrar Ingreso</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-view="tanques" id="nav-tanques">
                            <i class="bi bi-database-fill-gear"></i>
                            <span>Gestión Tanques</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-view="clientes" id="nav-clientes">
                            <i class="bi bi-people-fill"></i>
                            <span>Gestión Clientes</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-view="ventas-historial" id="nav-ventas-historial">
                            <i class="bi bi-clock-history"></i>
                            <span>Historial Ventas</span>
                        </a>
                    </li>
                    <li class="nav-divider"></li>
                    <li>
                        <a href="#" class="nav-link" data-view="empresa" id="nav-empresa">
                            <i class="bi bi-gear-fill"></i>
                            <span>Configuración</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="station-status">
                    <div class="status-dot online"></div>
                    <span id="api-status-text">Backend Conectado</span>
                </div>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="container-fluid d-flex align-items-center justify-content-between">
                    <div class="page-title-area">
                        <h2 id="current-view-title">Dashboard</h2>
                    </div>
                    <div class="header-profile">
                        <div class="station-meta text-end me-3 d-none d-md-block">
                            <span class="d-block station-name" id="station-header-name">Estación YaLiEs</span>
                            <span class="d-block station-nit" id="station-header-nit">NIT: ---</span>
                        </div>
                        <div class="profile-badge">
                            <i class="bi bi-person-circle"></i>
                            <span>Administrador</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content Container -->
            <main class="content-body" id="main-content">
                <!-- Dynamically loaded screen content will go here -->
                <div class="d-flex justify-content-center align-items-center h-100">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Modules Script Imports -->
    <script src="js/empresa.js"></script>
    <script src="js/tanques.js"></script>
    <script src="js/clientes.js"></script>
    <script src="js/ingresos.js"></script>
    <script src="js/ventas.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
